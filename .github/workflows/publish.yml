name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      # Wrapper releases track the upstream openwiki version they package.
      # Only stable vX.Y.Z tags are accepted (metadata-action adds `latest`
      # for stable semver only).
      - name: Verify tag matches upstream openwiki version
        run: |
          version="$(jq -er .version openwiki-src/package.json)"
          echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "Upstream version '$version' is not stable semver" >&2; exit 1; }
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match upstream openwiki version (v$version)" >&2
            exit 1
          fi

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: deathnerd
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        id: meta
        with:
          images: |
            deathnerd/openwiki
            ghcr.io/infiniteroomlabs/openwiki
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # No bare "0" tag while upstream is pre-1.0.
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Keep the Docker Hub page in sync with the README on every release.
      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4.0.2
        with:
          username: deathnerd
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: deathnerd/openwiki
          short-description: "Containerized langchain-ai/openwiki - agent docs for codebases (unofficial packaging)"
          readme-filepath: ./README.md
